spring.application.name=gateway
server.port=8080

# Customer Route
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/customer/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/customer(?<segment>/?.*),/customers${segment}

# Billing Route
spring.cloud.gateway.routes[1].id=billing-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/billing/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/billing(?<segment>/?.*),/billing${segment}