<h1>{{ portalName }}</h1>

<p>
  Manage your courses, view your profile, and track your academic progress.
</p>

<p>Available Courses: {{ availableCourses }}</p>

<hr>

<button
[disabled]="!isPortalActive"
(click)="onEnrollClick()">
Enroll Now
</button>

<p>{{message}}</p>

<hr>

<h3>Course Search</h3>

<!--
[property]
One-way binding (Component → DOM)

[(ngModel)]
Two-way binding (DOM ↔ Component)
-->

<input
type="text"
[(ngModel)]="searchTerm"
placeholder="Search Course">

<p>Searching for: {{searchTerm}}</p>
